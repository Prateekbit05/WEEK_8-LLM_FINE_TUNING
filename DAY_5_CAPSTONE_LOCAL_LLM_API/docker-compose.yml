#  DAY 5 CAPSTONE — docker-compose.yml
# ============================================================

version: "3.8"

services:
  llm-api:
    build: .
    container_name: local-llm-api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ~/.cache/huggingface:/app/model_cache
    environment:
      - TRANSFORMERS_CACHE=/app/model_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped